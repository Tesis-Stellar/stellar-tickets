name: Soroban Contracts CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
    - uses: actions/checkout@v4

    - name: Configure Rust toolchain for Soroban
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: contracts

    - name: Build all contracts
      run: cargo build --target wasm32-unknown-unknown --release --verbose

    - name: Test all contracts
      run: cargo test --verbose

    - name: Upload WASM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: soroban-contracts
        path: contracts/target/wasm32-unknown-unknown/release/*.wasm
        if-no-files-found: error
