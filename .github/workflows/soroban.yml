name: Soroban Contracts CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure Rust toolchain for Soroban
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      
    - name: Build Event Contract
      working-directory: ./contracts/event_contract
      run: cargo build --target wasm32-unknown-unknown --release --verbose

    - name: Test Event Contract
      working-directory: ./contracts/event_contract
      run: cargo test --verbose

    - name: Build Factory Contract
      working-directory: ./contracts/factory_contract
      run: cargo build --target wasm32-unknown-unknown --release --verbose

    - name: Test Factory Contract
      working-directory: ./contracts/factory_contract
      run: cargo test --verbose
