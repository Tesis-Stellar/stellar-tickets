name: Soroban Contracts CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
    - uses: actions/checkout@v4

    - name: Configure Rust toolchain for Soroban
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Install cargo-binstall
      run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

    - name: Install Stellar CLI (pre-built binary)
      run: cargo binstall --no-confirm stellar-cli

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: contracts
        key: soroban-v3

    - name: Build all contracts
      run: stellar contract build

    - name: Test all contracts
      run: cargo test --verbose

    - name: Upload WASM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: soroban-contracts
        path: contracts/target/wasm32-unknown-unknown/release/*.wasm
        if-no-files-found: error
