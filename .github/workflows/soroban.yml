name: Soroban Contracts CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.86.0"
  STELLAR_CLI_VERSION: "23.0.0"

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
    - uses: actions/checkout@v4

    - name: Configure Rust toolchain for Soroban
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ env.RUST_VERSION }}
        targets: wasm32-unknown-unknown,wasm32v1-none

    - name: Install cargo-binstall
      run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

    - name: Install Stellar CLI (pre-built binary)
      run: cargo binstall --no-confirm stellar-cli@${{ env.STELLAR_CLI_VERSION }}

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: contracts
        key: soroban-v4

    - name: Build event_contract
      run: stellar contract build --package event_contract

    - name: Build factory_contract
      run: stellar contract build --package factory_contract
      continue-on-error: true

    - name: Test all contracts
      run: cargo test --verbose

    - name: List built WASM files
      run: find target -name "*.wasm" -type f 2>/dev/null || true

    - name: Upload WASM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: soroban-contracts
        path: |
          contracts/target/wasm32-unknown-unknown/release/*.wasm
          contracts/target/wasm32v1-none/release/*.wasm
        if-no-files-found: warn
