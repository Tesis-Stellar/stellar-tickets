name: Web CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  backend:
    name: Backend build and unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      VERCEL: "1"
      RUN_INDEXER: "false"
      JWT_SECRET: "stellar-tickets-ci-secret-change-in-prod"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend
        run: npm run build

      - name: Run backend unit tests
        run: >
          node --import tsx --test
          src/apiError.test.ts
          src/checkinPolicy.test.ts
          src/checkoutPolicy.test.ts
          src/deployEventPolicy.test.ts
          src/qrPolicy.test.ts
          src/scannerPolicy.test.ts
          src/securityPolicy.test.ts
          src/seatHoldPolicy.test.ts
          src/transactionIntentPolicy.test.ts

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
